    case 'heart': return <svg {...p}><path d="M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 00-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 000-7.78z"/></svg>;

    case 'chevron-right': return <svg {...p}><path d="M9 18l6-6-6-6"/></svg>;

// ─── RADAR CHART ───────────────────────────────────────
const RadarChart = ({data,size=240}) => {
  // data: [{label, value 0-100, color}]
  const cx=size/2, cy=size/2, r=size*0.3;
  const n=data.length;
  const angle = (i) => -Math.PI/2 + (2*Math.PI*i)/n;
  const point = (i,frac) => ({
    x: cx + Math.cos(angle(i))*r*frac,
    y: cy + Math.sin(angle(i))*r*frac,
  });
  const labelPoint = (i) => ({
    x: cx + Math.cos(angle(i))*(r+22),
    y: cy + Math.sin(angle(i))*(r+22),
  });
  const valuePath = data.map((d,i)=>{
    const p = point(i, d.value/100);
    return `${i===0?'M':'L'}${p.x.toFixed(1)},${p.y.toFixed(1)}`;
  }).join(' ')+'Z';
  const grids=[0.25,0.5,0.75,1.0];

  return (
    <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`} style={{display:'block',margin:'0 auto',overflow:'visible'}}>
      {/* Grid pentagons */}
      {grids.map((g,gi)=>{
        const path = data.map((_,i)=>{
          const p=point(i,g);
          return `${i===0?'M':'L'}${p.x.toFixed(1)},${p.y.toFixed(1)}`;
        }).join(' ')+'Z';
        return <path key={gi} d={path} fill="none" stroke={C.border} strokeWidth={1}/>;
      })}
      {/* Spokes */}
      {data.map((_,i)=>{
        const p=point(i,1);
        return <line key={i} x1={cx} y1={cy} x2={p.x} y2={p.y} stroke={C.border} strokeWidth={1}/>;
      })}
      {/* Filled value area */}
      <path d={valuePath} fill={C.green+'33'} stroke={C.green} strokeWidth={2} strokeLinejoin="round"/>
      {/* Value points */}
      {data.map((d,i)=>{
        const p=point(i, d.value/100);
        return <circle key={i} cx={p.x} cy={p.y} r={4} fill={C.green} stroke={C.surface} strokeWidth={2}/>;
      })}
      {/* Labels */}
      {data.map((d,i)=>{
        const lp=labelPoint(i);
        const ang=angle(i);
        const anchor = Math.cos(ang)<-0.3?'end':Math.cos(ang)>0.3?'start':'middle';
        return (
          <g key={i}>
            <text x={lp.x} y={lp.y-4} textAnchor={anchor} fontFamily={SANS} fontSize="11" fontWeight="600" fill={C.text}>{d.label}</text>
            <text x={lp.x} y={lp.y+9} textAnchor={anchor} fontFamily={SANS} fontSize="10" fill={C.textLight}>{d.value}%</text>
          </g>
        );
      })}
    </svg>
  );
};

// ═══════════════════════════════════════════════════════
// ASK TAB
// ═══════════════════════════════════════════════════════
const AskTab = ({flowState,onAdvance}) => {
  const [msgs,setMsgs]=React.useState([
    {role:'agent',text:"Morning, Alex. What do you need?",time:'9:41'},
  ]);
  const [input,setInput]=React.useState('');
  const [typing,setTyping]=React.useState(false);
  const [sheet,setSheet]=React.useState(null);
  const [step,setStep]=React.useState(0);
  const endRef=React.useRef(null);
  const inputRef=React.useRef(null);

  React.useEffect(()=>{
    if(endRef.current) endRef.current.scrollIntoView({block:'end',behavior:'smooth'});
  },[msgs,typing]);

  React.useEffect(()=>{
    if(flowState==='nudge'){
      setTimeout(()=>{
        setMsgs(p=>[...p,{
          role:'agent',time:'now',
          text:"Got it. CAB 2-690 just opened up tomorrow 1–5 PM. Whiteboard's there. Remedy Café is 180m away.",
          rich:{type:'roomCard',room:'CAB 2-690',time:'Tue · 1:00–5:00 PM',amenities:['Quiet zone','Whiteboard','Window seat']}
        },{
          role:'agent',time:'now',
          text:"I'm tagging this room as a North Campus preference for next time. Sound right?",
          inline:true,
        }]);
      },200);
    }
  },[flowState]);

  const reply = (m,delay=900) => {
    setTyping(true);
    setTimeout(()=>{ setTyping(false); setMsgs(p=>[...p,{role:'agent',time:'now',...m}]); },delay);
  };

  const send = (override) => {
    const text = override || input.trim();
    if(!text) return;
    setMsgs(p=>[...p,{role:'user',text,time:'now'}]);
    setInput('');
    if(step===0){
      setStep(1);
      reply({text:"On it — North Campus, tomorrow afternoon. Two quick things first."},950);
      setTimeout(()=>setSheet('duration'),1900);
    }
  };

  const onDuration = (v) => {
    setSheet(null);
    setMsgs(p=>[...p,{role:'user',text:v,time:'now',compact:true}]);
    setStep(2);
    reply({text:`${v}, noted. Solo room, or quiet shared space?`},850);
    setTimeout(()=>setSheet('roomtype'),1800);
  };

  const onRoomType = (v) => {
    setSheet(null);
    setMsgs(p=>[...p,{role:'user',text:v,time:'now',compact:true}]);
    setStep(3);
    reply({text:"Solid. I'll deploy the agent — confirm to start tracking.",confirmBtn:true},900);
  };

  const confirm = () => {
    setMsgs(p=>[...p,{role:'agent',text:"Agent live. Scanning room.ualberta.ca + UAIMS now.",time:'now',scanning:true}]);
    setTimeout(()=>onAdvance(),700);
  };

  return (
    <div style={{display:'flex',flexDirection:'column',height:'100%',background:C.bg,position:'relative'}}>
      {/* Header */}
      <div style={{padding:'14px 20px 12px',background:C.surface,borderBottom:`1px solid ${C.border}`,display:'flex',alignItems:'center',justifyContent:'space-between'}}>
        <div>
          <div style={{fontFamily:SERIF,fontSize:24,fontWeight:500,color:C.text,letterSpacing:'-0.01em'}}>Ask</div>
          <div style={{fontFamily:SANS,fontSize:12,color:C.textLight,marginTop:1}}>
            {flowState==='nudge'?'1 match found':'Beartracks · UAlberta'}
          </div>
        </div>
        {(flowState==='track'||flowState==='nudge') && (
          <div style={{display:'flex',alignItems:'center',gap:6,background:C.greenLight,padding:'5px 10px',borderRadius:11}}>
            <PulsingDot size={6}/>
            <span style={{fontSize:11,fontWeight:700,color:C.green,fontFamily:SANS}}>1 LIVE</span>
          </div>
        )}
      </div>

      {/* Messages */}
      <div style={{flex:1,overflowY:'auto',padding:'18px 16px 130px'}}>
        {msgs.map((m,i)=><Bubble key={i} m={m} idx={i} total={msgs.length} step={step} onConfirm={confirm}/>)}
        {typing && <Typing/>}
        <div ref={endRef}/>
      </div>

      {/* Inline composer + quick chips on first load */}
      {step===0 && msgs.length===1 && !typing && (
        <div style={{padding:'4px 16px 0',marginTop:-8,marginBottom:18,animation:'fadeUp .35s ease'}}>
          <div style={{
            background:C.surface,border:`1.5px solid ${input.trim()?C.green:C.border}`,
            borderRadius:18,padding:'4px 6px 4px 16px',display:'flex',alignItems:'center',gap:6,
            transition:'border-color .2s',marginLeft:30,
            boxShadow:input.trim()?`0 4px 16px ${C.green}22`:'none',
          }}>
            <input value={input} onChange={e=>setInput(e.target.value)} onKeyDown={e=>e.key==='Enter'&&send()} autoFocus
              placeholder="Type a request…"
              style={{flex:1,border:'none',background:'none',padding:'10px 0',fontSize:14,fontFamily:SANS,color:C.text,outline:'none'}}/>
            <button onClick={()=>send()} style={{
              width:32,height:32,borderRadius:'50%',background:input.trim()?C.green:C.greenSoft,border:'none',cursor:'pointer',
              display:'flex',alignItems:'center',justifyContent:'center',transition:'background .2s',
            }}>
              <Icon name="arrow-up" size={15} color={input.trim()?'white':C.textLight} strokeWidth={2.4}/>
            </button>
          </div>
          <div style={{display:'flex',gap:7,flexWrap:'wrap',marginTop:12,marginLeft:30}}>
            {[
              {label:'Find a quiet study room',icon:'book'},
              {label:'My schedule today',icon:'calendar'},
              {label:'Research grants',icon:'sparkles'},
            ].map(q=>(
              <Chip key={q.label} icon={q.icon} label={q.label} onTap={()=>send(q.label)} small/>
            ))}
          </div>
        </div>
      )}

      {/* Input bar - prominent text box */}
      <div style={{
        position:'absolute',bottom:0,left:0,right:0,zIndex:50,
        background:'linear-gradient(180deg, rgba(250,251,249,0) 0%, rgba(250,251,249,.95) 25%, rgba(250,251,249,1) 100%)',
        padding:'14px 14px 22px',
      }}>
        <div style={{
          background:C.surface,border:`1.5px solid ${input.trim()?C.green:C.border}`,
          borderRadius:24,padding:'4px 6px 4px 18px',display:'flex',alignItems:'center',gap:8,
          transition:'border-color .2s',boxShadow:input.trim()?`0 4px 16px ${C.green}22`:'0 1px 4px rgba(0,0,0,.04)',
        }}>
          <input ref={inputRef} value={input} onChange={e=>setInput(e.target.value)} onKeyDown={e=>e.key==='Enter'&&send()}
            placeholder="Message Beartracks…"
            style={{flex:1,border:'none',background:'none',padding:'13px 0',fontSize:15,fontFamily:SANS,color:C.text,outline:'none'}}/>
          <button style={{background:'none',border:'none',cursor:'pointer',padding:8,display:'flex',color:C.textLight}}>
            <Icon name="mic" size={20}/>
          </button>
          <button onClick={()=>send()} style={{
            width:40,height:40,borderRadius:'50%',background:input.trim()?C.green:C.greenSoft,border:'none',cursor:'pointer',
            display:'flex',alignItems:'center',justifyContent:'center',transition:'background .2s',
          }}>
            <Icon name="arrow-up" size={18} color={input.trim()?'white':C.textLight} strokeWidth={2.2}/>
          </button>
        </div>
      </div>

      {/* Sheets */}
      <Sheet open={sheet==='duration'} onClose={()=>setSheet(null)}>
        <div style={{fontFamily:SERIF,fontSize:22,fontWeight:500,color:C.text,marginBottom:4}}>How long do you need it?</div>
        <div style={{fontFamily:SANS,fontSize:13,color:C.textLight,marginBottom:20}}>I'll narrow availability windows.</div>
        <div style={{display:'flex',flexDirection:'column',gap:8}}>
          {[
            {l:'1–2 hours',s:'Quick session',ic:'clock'},
            {l:'2–4 hours',s:'Afternoon block',ic:'clock'},
            {l:'4+ hours',s:'All day',ic:'clock'},
            {l:'Flexible',s:'Show all options',ic:'sliders'},
          ].map(o=>(
            <button key={o.l} onClick={()=>onDuration(o.l)} className="hover-row" style={{
              display:'flex',alignItems:'center',gap:14,padding:'14px 16px',
              background:C.bg,border:`1.5px solid ${C.border}`,borderRadius:14,cursor:'pointer',transition:'all .15s',
            }}
            onMouseEnter={e=>{e.currentTarget.style.borderColor=C.green;e.currentTarget.style.background=C.greenSoft}}
            onMouseLeave={e=>{e.currentTarget.style.borderColor=C.border;e.currentTarget.style.background=C.bg}}>
              <div style={{width:36,height:36,borderRadius:10,background:C.surface,display:'flex',alignItems:'center',justifyContent:'center',color:C.green}}>
                <Icon name={o.ic} size={18}/>
              </div>
              <div style={{flex:1,textAlign:'left'}}>
                <div style={{fontFamily:SANS,fontSize:15,fontWeight:600,color:C.text}}>{o.l}</div>
                <div style={{fontFamily:SANS,fontSize:12,color:C.textLight}}>{o.s}</div>
              </div>
              <Icon name="chevron-right" size={16} color={C.textLight}/>
            </button>
          ))}
        </div>
      </Sheet>

      <Sheet open={sheet==='roomtype'} onClose={()=>setSheet(null)}>
        <div style={{fontFamily:SERIF,fontSize:22,fontWeight:500,color:C.text,marginBottom:4}}>Room type?</div>
        <div style={{fontFamily:SANS,fontSize:13,color:C.textLight,marginBottom:20}}>Setting this as a Dealbreaker.</div>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:10}}>
          {[
            {l:'Solo only',s:'Private',ic:'user'},
            {l:'Quiet shared',s:'Low traffic',ic:'volume-x'},
            {l:'Either',s:'Show all',ic:'users'},
          ].map(o=>(
            <button key={o.l} onClick={()=>onRoomType(o.l)} style={{
              display:'flex',flexDirection:'column',alignItems:'center',gap:8,padding:'18px 8px',
              background:C.bg,border:`1.5px solid ${C.border}`,borderRadius:16,cursor:'pointer',transition:'all .15s',
            }}
            onMouseEnter={e=>{e.currentTarget.style.borderColor=C.green;e.currentTarget.style.background=C.greenSoft}}
            onMouseLeave={e=>{e.currentTarget.style.borderColor=C.border;e.currentTarget.style.background=C.bg}}>
              <div style={{width:40,height:40,borderRadius:'50%',background:C.surface,display:'flex',alignItems:'center',justifyContent:'center',color:C.green}}>
                <Icon name={o.ic} size={20}/>
              </div>
              <div style={{fontFamily:SANS,fontSize:13,fontWeight:600,color:C.text,textAlign:'center'}}>{o.l}</div>
              <div style={{fontFamily:SANS,fontSize:11,color:C.textLight}}>{o.s}</div>
            </button>
          ))}
        </div>
      </Sheet>
    </div>
  );
};

const Bubble = ({m,onConfirm}) => {
  if(m.role==='user') return (
    <div style={{display:'flex',justifyContent:'flex-end',marginBottom:14,animation:'fadeUp .3s ease'}}>
      <div style={{
        maxWidth:'78%',background:C.green,color:'white',
        borderRadius:'20px 20px 6px 20px',padding:m.compact?'8px 14px':'10px 14px',
        fontSize:14,fontFamily:SANS,lineHeight:1.5,
      }}>{m.text}</div>
    </div>
  );

  return (
    <div style={{marginBottom:14,animation:'fadeUp .3s ease'}}>
      <div style={{display:'flex',alignItems:'center',gap:6,marginBottom:5}}>
        <div style={{width:24,height:24,borderRadius:'50%',background:C.greenDeep,display:'flex',alignItems:'center',justifyContent:'center'}}>
          <span style={{fontSize:11,color:C.gold,fontWeight:800,fontFamily:SERIF}}>B</span>
        </div>
        <span style={{fontSize:11,color:C.textLight,fontFamily:SANS,fontWeight:500}}>Beartracks · {m.time}</span>

      <div style={{

        borderRadius:m.inline?0:'4px 18px 18px 18px',
        padding:m.inline?'2px 0':'12px 16px',
        border:m.inline?'none':`1px solid ${C.border}`,
        boxShadow:m.inline?'none':'0 1px 3px rgba(0,0,0,.04)',
      }}>
        <p style={{margin:0,fontSize:14,fontFamily:SANS,color:m.inline?C.textMid:C.text,lineHeight:1.55,fontStyle:m.inline?'italic':'normal'}}>

          {m.text}

        {m.scanning && (
          <div style={{marginTop:10,display:'flex',alignItems:'center',gap:8,padding:'8px 12px',background:C.greenSoft,borderRadius:10}}>

            <span style={{fontSize:12,fontFamily:SANS,color:C.green,fontWeight:600}}>Scanning room.ualberta.ca</span>
          </div>

        {m.rich?.type==='roomCard' && (
          <div style={{marginTop:12,padding:14,background:C.greenSoft,borderRadius:14,border:`1px solid ${C.green}33`}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:8}}>
              <div>
                <div style={{fontFamily:SERIF,fontSize:18,fontWeight:600,color:C.text}}>{m.rich.room}</div>
                <div style={{fontFamily:SANS,fontSize:12,color:C.textMid,marginTop:2}}>Cameron Library · 2nd floor</div>
              </div>
              <div style={{padding:'3px 9px',borderRadius:11,background:C.green,fontFamily:SANS,fontSize:10,fontWeight:700,color:'white',letterSpacing:'.04em'}}>OPEN</div>
            </div>
            <div style={{display:'flex',alignItems:'center',gap:6,fontFamily:SANS,fontSize:13,color:C.text,marginBottom:10}}>
              <Icon name="clock" size={14} color={C.green}/>{m.rich.time}
            </div>
            <div style={{display:'flex',gap:6,flexWrap:'wrap',marginBottom:12}}>
              {m.rich.amenities.map(a=><div key={a} style={{padding:'4px 10px',background:'white',borderRadius:11,fontFamily:SANS,fontSize:11,color:C.textMid,border:`1px solid ${C.border}`}}>{a}</div>)}
            </div>
            <button style={{
              width:'100%',background:C.green,color:'white',border:'none',borderRadius:14,
              padding:'12px',fontFamily:SANS,fontSize:14,fontWeight:700,cursor:'pointer',
              display:'flex',alignItems:'center',justifyContent:'center',gap:6,
            }}>
              <Icon name="check" size={16} strokeWidth={2.4}/>Reserve room
            </button>
          </div>
        )}

        {m.confirmBtn && (
          <button onClick={onConfirm} style={{
            marginTop:14,background:C.green,color:'white',border:'none',borderRadius:18,padding:'12px 22px',
            fontFamily:SANS,fontSize:14,fontWeight:600,cursor:'pointer',display:'flex',alignItems:'center',gap:8,
            boxShadow:`0 3px 12px ${C.green}33`,
          }}>
            Review parameters <Icon name="arrow-right" size={14} strokeWidth={2.4}/>
          </button>
        )}
      </div>
    </div>
  );
};

const Typing = () => (
  <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:14}}>
    <div style={{width:24,height:24,borderRadius:'50%',background:C.greenDeep,display:'flex',alignItems:'center',justifyContent:'center'}}>
      <span style={{fontSize:11,color:C.gold,fontWeight:800,fontFamily:SERIF}}>B</span>
    </div>
    <div style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:'4px 18px 18px 18px',padding:'12px 16px',display:'flex',gap:5}}>
      {[0,1,2].map(i=><div key={i} style={{width:5,height:5,borderRadius:'50%',background:C.textLight,animation:`typingDot 1.2s ease ${i*0.18}s infinite`}}></div>)}
    </div>
  </div>
);

// ═══════════════════════════════════════════════════════
// CREATE TAB — 3 classes: Agent / Milestone / Opportunity
// ═══════════════════════════════════════════════════════
const CLASSES=[
  {id:'agent',name:'Agent',sub:'Background search that runs continuously',icon:'sparkles',color:C.green},
  {id:'milestone',name:'Milestone',sub:'Long-term goal you\'re working toward',icon:'flag',color:'#7a4ec6'},
  {id:'opportunity',name:'Opportunity',sub:'A specific event, deadline, or application',icon:'star',color:C.gold},
  {id:'whatif',name:'What-If',sub:'Snap a flyer — find similar events',icon:'image',color:'#c8693a'},
];

const CreateTab = ({flowState,onDeploy}) => {
  const [selectedClass,setSelectedClass]=React.useState(flowState==='create'?'agent':null);
  const [draft,setDraft]=React.useState(flowState==='create');
  const [db,setDb]=React.useState(flowState==='create'?[
    {id:'loc',icon:'pin',label:'North Campus',type:'location'},
    {id:'date',icon:'calendar',label:'Tomorrow',type:'date'},
    {id:'noise',icon:'volume-x',label:'Quiet zone',type:'amenity'},
    {id:'time',icon:'clock',label:'12:00–5:00 PM',type:'time'},
  ]:[]);
  const [bon,setBon]=React.useState(flowState==='create'?[
    {id:'wb',icon:'eye',label:'Whiteboard',type:'amenity'},
    {id:'cof',icon:'compass',label:'Coffee < 5 min',type:'proximity'},
  ]:[]);
  const [editChip,setEditChip]=React.useState(null);
  const [parsing,setParsing]=React.useState(false);
  const [deploying,setDeploying]=React.useState(false);
  const [nlInput,setNlInput]=React.useState('');

  React.useEffect(()=>{
    if(flowState==='create' && !draft){ setSelectedClass('agent'); setDraft(true); }
  },[flowState]);

  const startNew = (cls) => {
    setSelectedClass(cls);
    setNlInput('');
    setDb([]); setBon([]);
    setDraft(true);
  };

  // What-If branch renders the dedicated panel
  if(draft && selectedClass==='whatif'){
    return (
      <div style={{display:'flex',flexDirection:'column',height:'100%',background:C.bg}}>
        <div style={{padding:'14px 20px 12px',background:C.surface,borderBottom:`1px solid ${C.border}`,display:'flex',alignItems:'center',gap:10}}>
          <button onClick={()=>setDraft(false)} style={{background:'none',border:'none',cursor:'pointer',color:C.textMid,padding:4,display:'flex'}}>
            <Icon name="arrow-right" size={20} style={{transform:'rotate(180deg)'}}/>
          </button>
          <div>
            <div style={{fontFamily:SERIF,fontSize:20,fontWeight:600,color:C.text,letterSpacing:'-0.01em'}}>What-If</div>
            <div style={{fontFamily:SANS,fontSize:11,color:C.textLight}}>Find similar events from a flyer</div>
          </div>
        </div>
        <div style={{flex:1,overflowY:'auto',padding:'18px 16px 100px'}}>
          <WhatIfPanel/>
        </div>
      </div>
    );
  }

  const parse = () => {
    if(!nlInput.trim()) return;
    setParsing(true);
    setTimeout(()=>{
      setParsing(false);
      // Generate fake parsed chips based on input
      setDb([
        {id:'loc',icon:'pin',label:'North Campus',type:'location'},
        {id:'date',icon:'calendar',label:'Tomorrow',type:'date'},
        {id:'noise',icon:'volume-x',label:'Quiet zone',type:'amenity'},
        {id:'time',icon:'clock',label:'12:00–5:00 PM',type:'time'},
      ]);
      setBon([
        {id:'wb',icon:'eye',label:'Whiteboard',type:'amenity'},
        {id:'cof',icon:'compass',label:'Coffee < 5 min',type:'proximity'},
      ]);
    },1200);
  };

  const moveChip = (chip,from) => {
    if(from==='db'){ setDb(p=>p.filter(c=>c.id!==chip.id)); setBon(p=>[...p,chip]); }
    else { setBon(p=>p.filter(c=>c.id!==chip.id)); setDb(p=>[...p,chip]); }
    setEditChip(null);
  };
  const removeChip = (chip,from) => {
    if(from==='db') setDb(p=>p.filter(c=>c.id!==chip.id));
    else setBon(p=>p.filter(c=>c.id!==chip.id));
    setEditChip(null);
  };

  const deploy = () => {
    setDeploying(true);
    setTimeout(()=>onDeploy(),900);
  };

  return (
    <div style={{display:'flex',flexDirection:'column',height:'100%',background:C.bg,position:'relative'}}>
      <div style={{padding:'14px 20px 12px',background:C.surface,borderBottom:`1px solid ${C.border}`}}>
        <div style={{fontFamily:SERIF,fontSize:24,fontWeight:500,color:C.text,letterSpacing:'-0.01em'}}>Create</div>
        <div style={{fontFamily:SANS,fontSize:12,color:C.textLight,marginTop:1}}>Agents · Milestones · Opportunities</div>
      </div>

      <div style={{flex:1,overflowY:'auto',padding:'16px',paddingBottom:130}}>
        {!draft && (
          <div style={{animation:'fadeUp .35s ease'}}>
            <div style={{fontFamily:SANS,fontSize:11,fontWeight:700,color:C.textMid,letterSpacing:'.08em',textTransform:'uppercase',marginBottom:12}}>What are you creating?</div>
            <div style={{display:'flex',flexDirection:'column',gap:10}}>
              {CLASSES.map(c=>(
                <button key={c.id} onClick={()=>startNew(c.id)} style={{
                  display:'flex',alignItems:'center',gap:14,padding:'18px 18px',background:C.surface,
                  border:`1.5px solid ${C.border}`,borderRadius:18,cursor:'pointer',transition:'all .18s',textAlign:'left',
                }}
                onMouseEnter={e=>{e.currentTarget.style.borderColor=c.color;e.currentTarget.style.transform='translateY(-1px)'}}
                onMouseLeave={e=>{e.currentTarget.style.borderColor=C.border;e.currentTarget.style.transform='translateY(0)'}}>
                  <div style={{width:44,height:44,borderRadius:14,background:c.color+'15',display:'flex',alignItems:'center',justifyContent:'center',color:c.color}}>
                    <Icon name={c.icon} size={22} strokeWidth={1.8}/>
                  </div>
                  <div style={{flex:1}}>
                    <div style={{fontFamily:SERIF,fontSize:18,fontWeight:600,color:C.text}}>{c.name}</div>
                    <div style={{fontFamily:SANS,fontSize:12,color:C.textLight,marginTop:2}}>{c.sub}</div>
                  </div>
                  <Icon name="chevron-right" size={18} color={C.textLight}/>
                </button>
              ))}
            </div>

            {/* Active drafts */}
            <div style={{marginTop:28,fontFamily:SANS,fontSize:11,fontWeight:700,color:C.textMid,letterSpacing:'.08em',textTransform:'uppercase',marginBottom:12}}>Recent drafts</div>
            <div style={{padding:'14px 16px',background:C.surface,border:`1px solid ${C.border}`,borderRadius:14,display:'flex',alignItems:'center',gap:10,opacity:.7}}>
              <Icon name="flag" size={18} color="#7a4ec6"/>
              <div style={{flex:1}}>
                <div style={{fontFamily:SANS,fontSize:14,fontWeight:600,color:C.text}}>Find Summer Research Position</div>
                <div style={{fontFamily:SANS,fontSize:11,color:C.textLight}}>3 parameters · 2d ago</div>
              </div>
              <Icon name="chevron-right" size={16} color={C.textLight}/>
            </div>
          </div>
        )}

        {draft && (
          <div style={{animation:'fadeUp .3s ease'}}>
            {/* Class header */}
            <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:14}}>
              <button onClick={()=>setDraft(false)} style={{background:'none',border:'none',cursor:'pointer',color:C.textMid,padding:4,display:'flex'}}>
                <Icon name="arrow-right" size={18} style={{transform:'rotate(180deg)'}}/>
              </button>
              <div style={{display:'flex',alignItems:'center',gap:8,flex:1}}>
                {(() => {
                  const c = CLASSES.find(c=>c.id===selectedClass)||CLASSES[0];
                  return (
                    <>
                      <div style={{width:28,height:28,borderRadius:9,background:c.color+'18',display:'flex',alignItems:'center',justifyContent:'center',color:c.color}}>
                        <Icon name={c.icon} size={16} strokeWidth={2}/>
                      </div>
                      <div style={{fontFamily:SERIF,fontSize:18,fontWeight:600,color:C.text}}>New {c.name}</div>
                    </>
                  );
                })()}
              </div>
            </div>

            {/* NL input */}
            <div style={{
              background:C.surface,border:`1.5px solid ${C.border}`,borderRadius:16,padding:'12px 14px',marginBottom:18,
            }}>
              <textarea value={nlInput} onChange={e=>setNlInput(e.target.value)} placeholder="Describe what you want to track in plain English…"
                style={{width:'100%',minHeight:54,border:'none',background:'none',resize:'none',
                  fontSize:14,fontFamily:SANS,color:C.text,outline:'none',lineHeight:1.5}}/>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginTop:8}}>
                <button style={{background:'none',border:'none',cursor:'pointer',color:C.textLight,fontSize:12,fontFamily:SANS,display:'flex',alignItems:'center',gap:5,padding:'4px 0'}}>
                  <Icon name="mic" size={14}/>Voice
                </button>
                <button onClick={parse} disabled={!nlInput.trim()} style={{
                  background:nlInput.trim()?C.green:C.greenSoft,color:nlInput.trim()?'white':C.textLight,
                  border:'none',borderRadius:12,padding:'8px 16px',fontFamily:SANS,fontSize:13,fontWeight:600,
                  cursor:nlInput.trim()?'pointer':'default',display:'flex',alignItems:'center',gap:6,
                }}>
                  <Icon name="wand" size={14} strokeWidth={2}/>{parsing?'Parsing…':'Parse'}
                </button>
              </div>
            </div>

            {parsing && (
              <div style={{padding:'40px 0',textAlign:'center'}}>
                <div style={{fontFamily:SANS,fontSize:13,color:C.textMid,marginBottom:14}}>Reading intent → extracting parameters</div>
                <div style={{display:'flex',justifyContent:'center',gap:5}}>
                  {[0,1,2,3,4].map(i=><div key={i} style={{width:6,height:6,borderRadius:'50%',background:C.green,animation:`typingDot 1s ease ${i*0.13}s infinite`}}></div>)}
                </div>
              </div>
            )}

            {!parsing && (db.length>0 || bon.length>0) && (

// TWEAKS PANEL
// ═══════════════════════════════════════════════════════
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "accentColor": "#1c5d3e",
  "fontDisplay": "Georgia",
  "showRadar": false,
  "chipRadius": 18
}/*EDITMODE-END*/;

const TweaksPanel = ({open,onClose}) => {
  const [t,setT]=React.useState(TWEAK_DEFAULTS);
  const set=(k,v)=>{
    setT(p=>({...p,[k]:v}));
    window.parent.postMessage({type:'__edit_mode_set_keys',edits:{[k]:v}},'*');
  };
  return (
    <div style={{
      position:'fixed',bottom:24,right:18,zIndex:9999,
      width:240,background:'white',borderRadius:18,
      boxShadow:'0 12px 48px rgba(0,0,0,.24)',
      border:`1px solid ${C.border}`,
      transform:open?'translateY(0) scale(1)':'translateY(20px) scale(.95)',
      opacity:open?1:0,pointerEvents:open?'all':'none',
      transition:'all .28s cubic-bezier(.34,1.56,.64,1)',overflow:'hidden',
    }}>
      <div style={{padding:'12px 16px',borderBottom:`1px solid ${C.border}`,display:'flex',alignItems:'center',justifyContent:'space-between'}}>
        <span style={{fontFamily:SERIF,fontSize:15,fontWeight:600,color:C.text}}>Tweaks</span>
        <button onClick={onClose} style={{background:'none',border:'none',cursor:'pointer',color:C.textLight,padding:2,display:'flex'}}><Icon name="x" size={16}/></button>
      </div>
      <div style={{padding:'14px 16px'}}>
        <Row label="Accent">
          <input type="color" value={t.accentColor} onChange={e=>set('accentColor',e.target.value)} style={{width:32,height:24,border:'none',borderRadius:5,padding:0,cursor:'pointer'}}/>
        </Row>
        <Row label="Display font">
          <select value={t.fontDisplay} onChange={e=>set('fontDisplay',e.target.value)} style={{fontSize:11,fontFamily:SANS,border:`1px solid ${C.border}`,borderRadius:7,padding:'3px 6px',background:C.bg,color:C.text}}>
            <option>Fraunces</option><option>Georgia</option><option>Inter</option>
          </select>
        </Row>
        <Row label={`Chip radius ${t.chipRadius}px`}>
          <input type="range" min="0" max="24" step="2" value={t.chipRadius} onChange={e=>set('chipRadius',+e.target.value)} style={{width:90}}/>
        </Row>
        <Row label="Engagement radar">
          <Toggle on={t.showRadar} onChange={()=>set('showRadar',!t.showRadar)}/>
        </Row>
      </div>
    </div>
  );
};

  </div>
);
const Toggle = ({on,onChange}) => (
  <button onClick={onChange} style={{
    width:38,height:22,borderRadius:11,border:'none',background:on?C.green:C.border,
    position:'relative',cursor:'pointer',transition:'background .2s',
  }}>
    <div style={{position:'absolute',top:2,left:on?18:2,width:18,height:18,borderRadius:'50%',background:'white',transition:'left .2s',boxShadow:'0 1px 3px rgba(0,0,0,.15)'}}></div>
  </button>
);

// ═══════════════════════════════════════════════════════
// APP ROOT
// ═══════════════════════════════════════════════════════
const App = () => {
  const [tab,setTab]=React.useState('ask');
  const [flow,setFlow]=React.useState('idle');
  const [nudge,setNudge]=React.useState(false);
  const [tweaksOpen,setTweaksOpen]=React.useState(false);

  React.useEffect(()=>{
    const h=e=>{
      if(e.data?.type==='__activate_edit_mode') setTweaksOpen(true);
      if(e.data?.type==='__deactivate_edit_mode') setTweaksOpen(false);
    };
    window.addEventListener('message',h);
    window.parent.postMessage({type:'__edit_mode_available'},'*');
    return ()=>window.removeEventListener('message',h);
  },[]);

  const goTo=(t)=>{ if(t!==tab) setTab(t); };

  const onAskAdvance=()=>{
    setFlow('create');
    setTimeout(()=>goTo('create'),350);
  };
  const onDeploy=()=>{
    setFlow('track');
    setTimeout(()=>goTo('track'),350);
  };
  const onNudge=()=>{
    setNudge(true);
    setTimeout(()=>{ setNudge(false); setFlow('nudge'); goTo('ask'); },2600);
  };

  const tabs = {
    ask: <AskTab flowState={flow} onAdvance={onAskAdvance}/>,
    create: <CreateTab flowState={flow} onDeploy={onDeploy}/>,
    track: <TrackTab flowState={flow} onNudge={onNudge}/>,
    profile: <ProfileTab/>,
  };

  return (
    <div style={{display:'flex',alignItems:'center',justifyContent:'center',height:'100vh',width:'100vw',
      background:'linear-gradient(135deg,#0a1610 0%,#142318 50%,#0a1610 100%)'}}>
      <div style={{
        position:'relative',width:'100%',maxWidth:430,height:'100%',maxHeight:932,
        background:C.surface,overflow:'hidden',display:'flex',flexDirection:'column',
        boxShadow:'0 40px 120px rgba(0,0,0,.6)',
      }}>
        {nudge && (
          <div style={{position:'absolute',top:54,left:14,right:14,zIndex:500,
            background:C.greenDeep,borderRadius:16,padding:'14px 16px',
            display:'flex',alignItems:'center',gap:12,
            boxShadow:`0 12px 40px ${C.green}66`,
            animation:'nudgePop .4s cubic-bezier(.34,1.56,.64,1) forwards',
          }}>
            <div style={{width:36,height:36,borderRadius:'50%',background:'rgba(212,167,44,.25)',display:'flex',alignItems:'center',justifyContent:'center',color:C.gold}}>
              <Icon name="target" size={18}/>
            </div>
            <div style={{flex:1}}>
              <div style={{fontFamily:SANS,fontSize:13,fontWeight:700,color:'white'}}>Match found</div>
              <div style={{fontFamily:SANS,fontSize:11,color:'rgba(255,255,255,.78)',marginTop:2}}>CAB 2-690 · Tomorrow 1–5 PM</div>
            </div>
            <button style={{background:C.gold,border:'none',borderRadius:10,padding:'7px 12px',color:'#1f1a08',fontFamily:SANS,fontSize:12,fontWeight:700,cursor:'pointer'}}>View</button>
          </div>
        )}

        <StatusBar/>
        <div style={{flex:1,overflow:'hidden',position:'relative'}}>
          {tabs[tab]}
        </div>
        <BottomNav active={tab} onChange={goTo}/>
      </div>
      <TweaksPanel open={tweaksOpen} onClose={()=>{setTweaksOpen(false);window.parent.postMessage({type:'__edit_mode_dismissed'},'*');}}/>
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
